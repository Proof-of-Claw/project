[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
mainnet = "${MAINNET_RPC_URL}"
og_testnet = "https://evmrpc-testnet.0g.ai"
og_mainnet = "https://evmrpc.0g.ai"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
og_testnet = { key = "", url = "https://chainscan-galileo.0g.ai/open/api" }
og_mainnet = { key = "", url = "https://chainscan.0g.ai/open/api" }
