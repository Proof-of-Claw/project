<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth modules — Proof of Claw</title>
<meta name="description" content="OAuth and agent auth modules: GitHub, Google, Discord, Telegram, Slack, and custom credentials.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="auth-modules-panel.css" id="poc-auth-modules-stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-primary: #06080d;
  --cyan: #00e5ff;
  --text-primary: #e8ecf4;
  --text-secondary: #8892a4;
  --border: rgba(255, 255, 255, 0.06);
  --border-cyan: rgba(0, 229, 255, 0.2);
  --cyan-glow: rgba(0, 229, 255, 0.15);
  --font-display: 'Syne', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
body {
  font-family: var(--font-mono);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 14px;
  min-height: 100vh;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 9999;
}
.grid-bg {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 1rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(6, 8, 13, 0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  text-decoration: none;
}
.nav-logo .claw-icon { width: 32px; height: 32px; position: relative; }
.nav-logo .claw-icon::before {
  content: '\29C1';
  font-size: 28px;
  color: var(--cyan);
  filter: drop-shadow(0 0 8px var(--cyan));
}
.nav-title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1.1rem;
  letter-spacing: -0.02em;
  color: var(--text-primary);
}
.nav-links { display: flex; gap: 1.75rem; list-style: none; flex-wrap: wrap; }
.nav-links a {
  text-decoration: none;
  color: var(--text-secondary);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 500;
  transition: color 0.2s;
}
.nav-links a:hover, .nav-links a.active { color: var(--cyan); }
.nav-badge {
  padding: 0.35rem 0.9rem;
  border: 1px solid var(--border-cyan);
  border-radius: 100px;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--cyan);
  background: var(--cyan-glow);
  text-decoration: none;
  transition: all 0.2s;
}
.nav-badge:hover {
  background: rgba(0, 229, 255, 0.22);
  box-shadow: 0 0 20px rgba(0, 229, 255, 0.12);
}
@media (max-width: 640px) { .nav-links { display: none; } }
</style>
</head>
<body>
<div class="grid-bg" aria-hidden="true"></div>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="claw-icon"></span>
    <span class="nav-title">Proof of Claw</span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="docs.html">Docs</a></li>
    <li><a href="auth-modules.html" class="active">Auth</a></li>
    <li><a href="agents.html">Agents</a></li>
    <li><a href="dashboard.html">Dashboard</a></li>
  </ul>
  <a href="agents.html" class="nav-badge">Launch App</a>
</nav>

<div class="auth-standalone-shell">
  <div id="auth-standalone-root"></div>
</div>

<script src="auth-modules-panel.js"></script>
<script>
  PocAuthModules.mount(document.getElementById('auth-standalone-root'));
</script>
</body>
</html>
