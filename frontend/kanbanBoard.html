<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban Board — Proof of Claw</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #06080d;
  --bg-secondary: #0c1018;
  --bg-card: #0f1520;
  --bg-card-hover: #141c2a;
  --cyan: #00e5ff;
  --cyan-dim: #00a3b5;
  --cyan-glow: rgba(0, 229, 255, 0.15);
  --amber: #ffb300;
  --amber-glow: rgba(255, 179, 0, 0.12);
  --green: #00e676;
  --green-glow: rgba(0, 230, 118, 0.12);
  --red: #ff3d5a;
  --purple: #b388ff;
  --purple-glow: rgba(179, 136, 255, 0.15);
  --text-primary: #e8ecf4;
  --text-secondary: #8892a4;
  --text-dim: #4a5568;
  --border: rgba(255, 255, 255, 0.06);
  --border-cyan: rgba(0, 229, 255, 0.2);
  --font-display: 'Syne', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --sidebar-w: 240px;
  --topbar-h: 60px;
}

html, body { height: 100%; }

body {
  font-family: var(--font-mono);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  font-size: 14px;
  overflow-x: hidden;
}

.grid-bg {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  z-index: 0;
  pointer-events: none;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* ======================================== */
/* SIDEBAR                                  */
/* ======================================== */
.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 200;
  padding: 1.5rem 0;
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0 1.25rem;
  margin-bottom: 2rem;
  text-decoration: none;
}

.sidebar-logo .claw-icon { font-size: 24px; color: var(--cyan); filter: drop-shadow(0 0 8px var(--cyan)); }

.sidebar-logo .logo-text {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.02em;
}

.sidebar-nav { flex: 1; padding: 0 0.75rem; display: flex; flex-direction: column; gap: 2px; }

.sidebar-nav a {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.6rem 0.75rem;
  border-radius: 8px;
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s ease;
}

.sidebar-nav a:hover { background: var(--bg-card); color: var(--text-primary); }
.sidebar-nav a.active { background: var(--cyan-glow); color: var(--cyan); }

.sidebar-nav a .icon { font-size: 16px; width: 20px; text-align: center; }

.sidebar-divider { height: 1px; background: var(--border); margin: 0.75rem 1rem; }

.sidebar-footer { padding: 0 0.75rem; display: flex; flex-direction: column; gap: 4px; }

.sidebar-btn {
  display: block;
  padding: 0.6rem 1rem;
  border-radius: 8px;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  text-align: center;
  text-decoration: none;
  cursor: pointer;
  border: none;
  transition: all 0.15s ease;
}

.sidebar-btn.primary { background: var(--cyan); color: #000; }
.sidebar-btn.primary:hover { filter: brightness(1.1); box-shadow: 0 0 20px var(--cyan-glow); }
.sidebar-btn.ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
.sidebar-btn.ghost:hover { background: var(--bg-card); color: var(--text-primary); }

/* ======================================== */
/* MAIN CONTENT                             */
/* ======================================== */
.main {
  margin-left: var(--sidebar-w);
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

.topbar {
  position: sticky;
  top: 0;
  height: var(--topbar-h);
  background: rgba(6, 8, 13, 0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2rem;
  z-index: 100;
}

.topbar-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.topbar-title .dot { color: var(--cyan); }

.topbar-actions { display: flex; align-items: center; gap: 0.75rem; }

.btn {
  padding: 0.5rem 1rem;
  border-radius: 8px;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  border: none;
  transition: all 0.15s ease;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
}

.btn-primary { background: var(--cyan); color: #000; }
.btn-primary:hover { filter: brightness(1.1); box-shadow: 0 0 20px var(--cyan-glow); }
.btn-secondary { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg-card-hover); }

/* ======================================== */
/* KANBAN BOARD                             */
/* ======================================== */
.board-wrap {
  padding: 2rem;
  overflow-x: auto;
}

.board {
  display: flex;
  gap: 1.5rem;
  align-items: flex-start;
  min-width: max-content;
}

/* Columns */
.column {
  width: 300px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.column-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.75rem 1rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  position: sticky;
  top: var(--topbar-h);
}

.column-title {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.col-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.col-todo .col-dot { background: var(--amber); box-shadow: 0 0 6px var(--amber-glow); }
.col-inprogress .col-dot { background: var(--cyan); box-shadow: 0 0 6px var(--cyan-glow); }
.col-review .col-dot { background: var(--purple); box-shadow: 0 0 6px var(--purple-glow); }
.col-done .col-dot { background: var(--green); box-shadow: 0 0 6px var(--green-glow); }

.col-count {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 1px 8px;
  min-width: 24px;
  text-align: center;
}

.column-cards { display: flex; flex-direction: column; gap: 0.6rem; min-height: 60px; }

/* Cards */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem;
  cursor: grab;
  transition: all 0.15s ease;
  user-select: none;
}

.card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-cyan);
  box-shadow: 0 4px 24px rgba(0, 229, 255, 0.06);
  transform: translateY(-1px);
}

.card.dragging {
  opacity: 0.5;
  cursor: grabbing;
  transform: rotate(2deg) scale(1.02);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  border-color: var(--cyan);
}

.card-priority {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 2px 7px;
  border-radius: 4px;
}

.pri-high { color: var(--red); background: rgba(255,61,90,0.1); border: 1px solid rgba(255,61,90,0.2); }
.pri-medium { color: var(--amber); background: var(--amber-glow); border: 1px solid rgba(255,179,0,0.2); }
.pri-low { color: var(--green); background: var(--green-glow); border: 1px solid rgba(0,230,118,0.2); }

.card-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 0.6rem;
  line-height: 1.5;
}

.card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-dim);
}

.card-agent {
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.agent-avatar {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--cyan-glow);
  border: 1px solid var(--border-cyan);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  color: var(--cyan);
  font-weight: 700;
}

.card-id { font-family: var(--font-mono); color: var(--text-dim); }

/* Drag-over highlight */
.column-cards.drag-over {
  background: rgba(0,229,255,0.04);
  border: 2px dashed rgba(0,229,255,0.25);
  border-radius: 10px;
  transition: all 0.15s ease;
}

/* Add card button */
.add-card-btn {
  width: 100%;
  padding: 0.6rem;
  background: transparent;
  border: 1px dashed rgba(255,255,255,0.1);
  border-radius: 10px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
}

.add-card-btn:hover {
  background: var(--cyan-glow);
  border-color: var(--border-cyan);
  color: var(--cyan);
}

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 500;
  align-items: center;
  justify-content: center;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border-cyan);
  border-radius: 14px;
  padding: 2rem;
  width: 420px;
  max-width: 90vw;
  box-shadow: 0 24px 80px rgba(0,229,255,0.1);
  animation: modalIn 0.2s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal h2 {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 1.5rem;
}

.form-group { margin-bottom: 1rem; }

.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 0.4rem;
}

.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 0.6rem 0.8rem;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
  resize: none;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { border-color: var(--cyan); }

.form-group textarea { height: 80px; }

.form-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }

/* Filter bar */
.filter-bar {
  padding: 1rem 2rem 0;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}

.filter-tag {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  transition: all 0.15s;
}

.filter-tag:hover, .filter-tag.active {
  border-color: var(--border-cyan);
  color: var(--cyan);
  background: var(--cyan-glow);
}

/* Empty state */
.empty-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  color: var(--text-dim);
  font-size: 12px;
  text-align: center;
  gap: 0.5rem;
  border: 1px dashed rgba(255,255,255,0.06);
  border-radius: 10px;
  min-height: 100px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-card-hover); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<div class="grid-bg"></div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <a href="index.html" class="sidebar-logo">
    <span class="claw-icon">&#99076;</span>
    <span class="logo-text">Proof of Claw</span>
  </a>

  <nav class="sidebar-nav">
    <a href="index.html"><span class="icon">&#127968;</span> Home</a>
    <a href="dashboard.html"><span class="icon">&#128200;</span> Dashboard</a>
    <a href="agents.html"><span class="icon">&#129302;</span> Agents</a>
    <a href="messages.html"><span class="icon">&#128172;</span> Messages</a>
    <a href="proofs.html"><span class="icon">&#128275;</span> Proofs</a>
    <a href="kanbanBoard.html" class="active"><span class="icon">&#128203;</span> Kanban</a>
    <a href="docs.html"><span class="icon">&#128196;</span> Docs</a>
    <a href="deploy.html"><span class="icon">&#9881;</span> Deploy</a>
  </nav>

  <div class="sidebar-divider"></div>

  <div class="sidebar-footer">
    <a href="agents.html#register" class="sidebar-btn primary">+ New Agent</a>
    <a href="index.html" class="sidebar-btn ghost">Back to Home</a>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="topbar-title">
      <span>&#128203;</span> Kanban <span class="dot">//</span> Agent Task Board
    </div>
    <div class="topbar-actions">
      <button class="btn btn-primary" id="add-task-btn">+ Add Task</button>
    </div>
  </div>

  <div class="filter-bar">
    <span style="font-size:11px;color:var(--text-dim);font-weight:700;letter-spacing:0.06em;text-transform:uppercase;">Filter:</span>
    <button class="filter-tag active" data-filter="all">All</button>
    <button class="filter-tag" data-filter="high">High Priority</button>
    <button class="filter-tag" data-filter="medium">Medium</button>
    <button class="filter-tag" data-filter="low">Low</button>
    <button class="filter-tag" data-filter="mine">My Tasks</button>
  </div>

  <div class="board-wrap">
    <div class="board" id="board">

      <!-- TO DO -->
      <div class="column col-todo">
        <div class="column-header">
          <div class="column-title"><span class="col-dot"></span> To Do</div>
          <span class="col-count" id="count-todo">0</span>
        </div>
        <div class="column-cards" id="cards-todo" data-col="todo"></div>
        <button class="add-card-btn" data-col="todo">+ Add card</button>
      </div>

      <!-- IN PROGRESS -->
      <div class="column col-inprogress">
        <div class="column-header">
          <div class="column-title"><span class="col-dot"></span> In Progress</div>
          <span class="col-count" id="count-inprogress">0</span>
        </div>
        <div class="column-cards" id="cards-inprogress" data-col="inprogress"></div>
        <button class="add-card-btn" data-col="inprogress">+ Add card</button>
      </div>

      <!-- REVIEW -->
      <div class="column col-review">
        <div class="column-header">
          <div class="column-title"><span class="col-dot"></span> Review</div>
          <span class="col-count" id="count-review">0</span>
        </div>
        <div class="column-cards" id="cards-review" data-col="review"></div>
        <button class="add-card-btn" data-col="review">+ Add card</button>
      </div>

      <!-- DONE -->
      <div class="column col-done">
        <div class="column-header">
          <div class="column-title"><span class="col-dot"></span> Done</div>
          <span class="col-count" id="count-done">0</span>
        </div>
        <div class="column-cards" id="cards-done" data-col="done"></div>
        <button class="add-card-btn" data-col="done">+ Add card</button>
      </div>

    </div>
  </div>
</main>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>&#99025; New Task</h2>
    <div class="form-group">
      <label>Task Title</label>
      <input type="text" id="task-title" placeholder="e.g. Deploy ZK verifier to mainnet" />
    </div>
    <div class="form-group">
      <label>Priority</label>
      <select id="task-priority">
        <option value="high">High</option>
        <option value="medium" selected>Medium</option>
        <option value="low">Low</option>
      </select>
    </div>
    <div class="form-group">
      <label>Assign to Agent</label>
      <select id="task-agent">
        <option value="agent-1">Agent Alpha</option>
        <option value="agent-2">Agent Beta</option>
        <option value="agent-3">Agent Gamma</option>
        <option value="agent-4">Agent Delta</option>
      </select>
    </div>
    <div class="form-group">
      <label>Column</label>
      <select id="task-col">
        <option value="todo">To Do</option>
        <option value="inprogress">In Progress</option>
        <option value="review">Review</option>
        <option value="done">Done</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-save">Create Task</button>
    </div>
  </div>
</div>

<script>
// ========================================
// DATA
// ========================================
const agents = {
  'agent-1': 'AA', 'agent-2': 'BB', 'agent-3': 'GG', 'agent-4': 'DD'
};

let tasks = [
  { id: 'POC-001', title: 'Finalize ZK proof circuit for agent auth', priority: 'high', agent: 'agent-1', col: 'inprogress' },
  { id: 'POC-002', title: 'Integrate DM3 messaging with web frontend', priority: 'high', agent: 'agent-2', col: 'review' },
  { id: 'POC-003', title: 'Write Solidity tests for DeFiHub', priority: 'medium', agent: 'agent-3', col: 'todo' },
  { id: 'POC-004', title: 'Deploy iNFT contract to Sepolia', priority: 'high', agent: 'agent-1', col: 'inprogress' },
  { id: 'POC-005', title: 'Set up Tenderly simulation pipeline', priority: 'low', agent: 'agent-4', col: 'todo' },
  { id: 'POC-006', title: 'Audit access control in IronClaw module', priority: 'medium', agent: 'agent-2', col: 'todo' },
  { id: 'POC-007', title: 'Document EIP-8004 compliance layer', priority: 'low', agent: 'agent-3', col: 'done' },
  { id: 'POC-008', title: 'ZK verifier benchmark — latency profiling', priority: 'medium', agent: 'agent-4', col: 'review' },
  { id: 'POC-009', title: 'Update frontend to match new contract ABI', priority: 'high', agent: 'agent-2', col: 'inprogress' },
  { id: 'POC-010', title: 'Add ENS resolver integration to frontend', priority: 'low', agent: 'agent-1', col: 'done' },
];

// ========================================
// RENDER
// ========================================
function renderBoard(filter = 'all') {
  const cols = ['todo', 'inprogress', 'review', 'done'];
  cols.forEach(col => {
    const container = document.getElementById(`cards-${col}`);
    const countEl = document.getElementById(`count-${col}`);
    const filtered = tasks.filter(t => t.col === col && matchesFilter(t, filter));
    const allInCol = tasks.filter(t => t.col === col);

    container.innerHTML = '';
    countEl.textContent = allInCol.length;

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty-col">No tasks here</div>`;
      return;
    }

    filtered.forEach(task => {
      const div = document.createElement('div');
      div.className = 'card';
      div.draggable = true;
      div.dataset.id = task.id;
      div.innerHTML = `
        <div class="card-priority pri-${task.priority}">${task.priority}</div>
        <div class="card-title">${task.title}</div>
        <div class="card-meta">
          <div class="card-agent">
            <div class="agent-avatar">${agents[task.agent]}</div>
            <span>${task.agent.replace('agent-', 'Agent ')}</span>
          </div>
          <span class="card-id">${task.id}</span>
        </div>
      `;
      container.appendChild(div);
    });
  });
}

function matchesFilter(task, filter) {
  if (filter === 'all') return true;
  if (filter === 'mine') return task.agent === 'agent-1';
  return task.priority === filter;
}

// ========================================
// DRAG & DROP
// ========================================
let draggedCard = null;

document.addEventListener('dragstart', e => {
  if (!e.target.classList.contains('card')) return;
  draggedCard = e.target;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
});

document.addEventListener('dragend', e => {
  if (!e.target.classList.contains('card')) return;
  e.target.classList.remove('dragging');
  document.querySelectorAll('.column-cards').forEach(c => c.classList.remove('drag-over'));
  draggedCard = null;
});

document.querySelectorAll('.column-cards').forEach(col => {
  col.addEventListener('dragover', e => {
    e.preventDefault();
    col.classList.add('drag-over');
  });

  col.addEventListener('dragleave', () => {
    col.classList.remove('drag-over');
  });

  col.addEventListener('drop', e => {
    e.preventDefault();
    col.classList.remove('drag-over');
    if (!draggedCard) return;
    const taskId = draggedCard.dataset.id;
    const newCol = col.dataset.col;
    const task = tasks.find(t => t.id === taskId);
    if (task) { task.col = newCol; renderBoard(getCurrentFilter()); }
  });
});

// ========================================
// MODAL
// ========================================
const modal = document.getElementById('modal');
const addTaskBtn = document.getElementById('add-task-btn');
const modalCancel = document.getElementById('modal-cancel');
const modalSave = document.getElementById('modal-save');

let pendingCol = 'todo';

addTaskBtn.addEventListener('click', () => {
  document.getElementById('task-title').value = '';
  document.getElementById('task-priority').value = 'medium';
  document.getElementById('task-agent').value = 'agent-1';
  document.getElementById('task-col').value = 'todo';
  modal.classList.add('open');
  document.getElementById('task-title').focus();
});

document.querySelectorAll('.add-card-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    pendingCol = btn.dataset.col;
    document.getElementById('task-title').value = '';
    document.getElementById('task-priority').value = 'medium';
    document.getElementById('task-agent').value = 'agent-1';
    document.getElementById('task-col').value = pendingCol;
    modal.classList.add('open');
    document.getElementById('task-title').focus();
  });
});

modalCancel.addEventListener('click', () => modal.classList.remove('open'));

modalSave.addEventListener('click', () => {
  const title = document.getElementById('task-title').value.trim();
  const priority = document.getElementById('task-priority').value;
  const agent = document.getElementById('task-agent').value;
  const col = document.getElementById('task-col').value;

  if (!title) { document.getElementById('task-title').focus(); return; }

  const nextNum = String(tasks.length + 1).padStart(3, '0');
  tasks.push({ id: `POC-${nextNum}`, title, priority, agent, col });
  modal.classList.remove('open');
  renderBoard(getCurrentFilter());
});

modal.addEventListener('click', e => {
  if (e.target === modal) modal.classList.remove('open');
});

// ========================================
// FILTER BAR
// ========================================
let currentFilter = 'all';

function getCurrentFilter() { return currentFilter; }

document.querySelectorAll('.filter-tag').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-tag').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderBoard(currentFilter);
  });
});

// ========================================
// INIT
// ========================================
renderBoard();
</script>
</body>
</html>
